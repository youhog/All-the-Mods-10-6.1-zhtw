name: 自動打包並發布繁體中文補丁

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 檢查 JSON 語法
        run: |
          find overrides/kubejs/assets -name "*.json" -exec python3 -c "import json, sys; json.load(open(sys.argv[1]))" {} \;
        shell: bash

      - name: 打包成 ZIP
        run: |
          zip -r ATM10_ZH_TW_Patch.zip overrides manifest.json
        shell: bash

      - name: 建立 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ATM10_ZH_TW_Patch.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
