name: 繁體中文翻譯自動化流程 (CI/CD)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: 語法檢查
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: JSON 語法檢查
        run: |
          echo "🔍 正在檢查 JSON 翻譯檔..."
          find overrides/kubejs/assets -name "*.json" -type f -exec python3 -m json.tool {} \; > /dev/null

      - name: SNBT 語法檢查 (基本)
        run: |
          echo "🔍 檢查 SNBT 任務檔是否完整..."
          # 檢查引號是否成對 (簡單的防斷頭檢查)
          find overrides/config/ftbquests/quests/lang/zh_tw -name "*.snbt" -type f | while read file; do
            COUNT=$(grep -o '"' "$file" | wc -l)
            if (( COUNT % 2 != 0 )); then
              echo "❌ $file 發現引號未閉合，可能翻譯內容被截斷！"
              exit 1
            fi
          done
          echo "✅ SNBT 檢查通過！"

  package:
    name: 打包與發布
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 獲取版本號
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          fi

      - name: 更新 README 版本資訊
        run: |
          # 將 README 中的 vX.X.X 佔位符替換為當前版本號
          sed -i "s/vX.X.X/${{ steps.vars.outputs.version }}/g" README.md
        shell: bash

      - name: 製作全套補丁 Zip (Overrides)
        run: |
          zip -r "ATM10_Full_Patch_${{ steps.vars.outputs.version }}.zip" overrides manifest.json pack.mcmeta

      - name: 製作模組 JAR (Neoforge)
        run: |
          mkdir -p build/assets
          mkdir -p build/META-INF
          cp -r overrides/kubejs/assets/* build/assets/
          cp META-INF/neoforge.mods.toml build/META-INF/
          cp pack.mcmeta build/
          cd build && zip -r ../"ATM10_ZHTW_Mod_${{ steps.vars.outputs.version }}.jar" . && cd ..

      - name: 製作任務書專用 Zip (Config)
        run: |
          mkdir -p pack/config/ftbquests/quests/lang/zh_tw
          cp -r overrides/config/ftbquests/quests/lang/zh_tw/* pack/config/ftbquests/quests/lang/zh_tw/
          zip -r "ATM10_Quests_Only_${{ steps.vars.outputs.version }}.zip" pack/*

      - name: 製作語言資源包 (Resource Pack)
        run: |
          mkdir -p res_pack/assets
          cp -r overrides/kubejs/assets/* res_pack/assets/
          cp pack.mcmeta res_pack/
          cd res_pack && zip -r ../"ATM10_ResourcePack_ZHTW_${{ steps.vars.outputs.version }}.zip" . && cd ..
        shell: bash

      - name: 上傳成品至 Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ATM10-CHT-Builds
          path: |
            ATM10_Full_Patch_*.zip
            ATM10_ZHTW_Mod_*.jar
            ATM10_Quests_Only_*.zip
            ATM10_ResourcePack_ZHTW_*.zip

      - name: 自動建立 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ATM10_Full_Patch_${{ steps.vars.outputs.version }}.zip
            ATM10_ZHTW_Mod_${{ steps.vars.outputs.version }}.jar
            ATM10_Quests_Only_${{ steps.vars.outputs.version }}.zip
            ATM10_ResourcePack_ZHTW_${{ steps.vars.outputs.version }}.zip
          body: |
            # 📦 All the Mods 10 繁體中文在地化補丁 ${{ steps.vars.outputs.version }}

            本版本包含了對 ATM10 模組包的全面繁體中文化更新。

            ### 📂 檔案說明 (File Descriptions)
            | 檔案名稱 | 用途說明 | 安裝建議 |
            | :--- | :--- | :--- |
            | `ATM10_ZHTW_Mod.jar` | 模組化補丁，包含所有介面與物品名稱翻譯 | **推薦使用**，放入 `mods` 資料夾 |
            | `ATM10_Quests_Only.zip` | 僅包含 FTB Quests 任務書翻譯 | 解壓後覆蓋 `config` 資料夾 |
            | `ATM10_Full_Patch.zip` | 完整的 Overrides 覆蓋包 | 適用於整合包製作環境 |

            ### 🛠️ 更新摘要
            * **完整在地化**：全數 63 個任務章節已完成繁體中文化。
            * **術語對齊**：修正了大量金屬錠、板材與機器零件的學名對應。
            * **自動化檢驗**：所有檔案皆通過 JSON/SNBT 語法合規性檢查。

            ---
            詳細安裝指南請參閱 [README.md](https://github.com/${{ github.repository }}#-%E5%AE%89%E8%A3%9D%E8%AA%AA%E6%98%8E-installation-guide)。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
