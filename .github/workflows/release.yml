name: ATM10 繁體中文補丁發布

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: 檢出程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 取得版本
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 檢查 JSON
        run: |
          find overrides -name "*.json" -print -exec python3 -m json.tool {} > /dev/null \;

      - name: 建立 build
        run: mkdir build

      - name: 打包 ZIP
        run: |
          zip -r build/ATM10_ZH_TW_Patch_${{ steps.version.outputs.version }}.zip overrides manifest.json

      - name: 產生 SHA256
        run: |
          cd build
          sha256sum *.zip > SHA256SUMS.txt

      - name: 生成 Changelog
        run: |
          echo "## 更新內容" > release.md

          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD \
          --pretty=format:"- %s" >> release.md || echo "- 初始版本" >> release.md

          echo "" >> release.md
          echo "## SHA256" >> release.md
          cat build/SHA256SUMS.txt >> release.md

      - name: 發布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ATM10 繁體中文補丁 ${{ steps.version.outputs.version }}
          body_path: release.md
          files: |
            build/*.zip
            build/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
