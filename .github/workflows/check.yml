name: Translation Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: JSON syntax check
        run: |
          find overrides -name "*.json" -exec python3 -m json.tool {} > /dev/null \;

      - name: Translation analysis
        run: |
          python3 - <<PY
import json, os, sys

keys=set()
dup=set()
empty=0
total=0

for root,_,files in os.walk("overrides"):
    for f in files:
        if f.endswith(".json"):
            path=os.path.join(root,f)

            with open(path,encoding="utf-8") as fp:
                data=json.load(fp)

            for k,v in data.items():
                total+=1

                if k in keys:
                    dup.add(k)
                else:
                    keys.add(k)

                if isinstance(v,str) and v.strip()=="":
                    empty+=1

if dup:
    print("Duplicate keys:")
    for d in dup:
        print(d)

done=total-empty

print("Total:",total)
print("Translated:",done)
print("Missing:",empty)

if empty>0:
    sys.exit(1)
PY
