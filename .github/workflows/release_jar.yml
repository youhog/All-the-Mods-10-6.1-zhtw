name: 自動打包翻譯模組 (JAR)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 準備 JAR 結構
        run: |
          mkdir -p build/assets
          mkdir -p build/META-INF
          
          # 複製模組翻譯 (JSON)
          cp -r overrides/kubejs/assets/* build/assets/
          
          # 複製元數據
          cp META-INF/neoforge.mods.toml build/META-INF/
          
          # 建立 JAR
          cd build && zip -r ../ATM10_ZHTW_Patch.jar . && cd ..
        shell: bash

      - name: 準備任務書 Zip (Config 覆蓋)
        run: |
          mkdir -p pack/config/ftbquests/quests/lang/zh_tw
          cp -r overrides/config/ftbquests/quests/lang/zh_tw/* pack/config/ftbquests/quests/lang/zh_tw/
          zip -r ATM10_Quests_ZHTW.zip pack/*
        shell: bash

      - name: 建立 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ATM10_ZHTW_Patch.jar
            ATM10_Quests_ZHTW.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
