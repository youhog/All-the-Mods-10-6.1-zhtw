name: Auto Format JSON

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Format JSON
        run: |
          python3 - <<PY
import json, os

changed=False

for root,_,files in os.walk("overrides"):
    for f in files:
        if f.endswith(".json"):
            path=os.path.join(root,f)

            with open(path,encoding="utf-8") as fp:
                data=json.load(fp)

            new=json.dumps(data,indent=2,ensure_ascii=False,sort_keys=True)+"\n"

            with open(path,encoding="utf-8") as fp:
                old=fp.read()

            if new!=old:
                with open(path,"w",encoding="utf-8") as fp:
                    fp.write(new)
                changed=True

if changed:
    print("JSON formatted")
PY

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || git commit -m "Auto format JSON"
          git push
